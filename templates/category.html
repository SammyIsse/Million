{% extends "base.html" %}
{% from "macros/pagination.html" import render_pagination %}

{% block title %}{{ category_name }} — CartSpotter{% endblock %}

{% block content %}
<div class="page-wrap">
  <div class="container-category">
    <h1 class="category-title">{{ category_name }}</h1>
    <div class="filters-wrapper">
      <div class="store-filters">
        <button class="store-filter-btn" data-store="Rema 1000">
          <span class="store-filter-dot"></span> Rema 1000
        </button>
        <button class="store-filter-btn" data-store="Bilka">
          <span class="store-filter-dot"></span> Bilka
        </button>
        <button class="store-filter-btn" data-store="Meny">
          <span class="store-filter-dot"></span> Meny
        </button>
        <button class="store-filter-btn" data-store="Spar">
          <span class="store-filter-dot"></span> Spar
        </button>
        <button class="store-filter-btn" data-store="Min Købmand">
          <span class="store-filter-dot"></span> Min Købmand
        </button>
        <button class="store-filter-btn" data-store="SuperBrugsen">
          <span class="store-filter-dot"></span> SuperBrugsen
        </button>
        <button class="store-filter-btn" data-store="Brugsen">
          <span class="store-filter-dot"></span> Brugsen
        </button>
        <button class="store-filter-btn" data-store="Kvickly">
          <span class="store-filter-dot"></span> Kvickly
        </button>
        <button class="store-filter-btn" data-store="365 Discount">
          <span class="store-filter-dot"></span> 365 Discount
        </button>
      </div>

      <div class="advanced-filters-container">
        <button id="toggleAdvancedFiltersCategory" class="advanced-filters-toggle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
          Filtrering & Sortering
        </button>
        {% include 'partials/filters.html' %}
      </div>
    </div>

    <div id="dynamic-content">
      {% include 'partials/product_grid.html' %}
    </div>
  </div>
</div>
{% endblock %}
