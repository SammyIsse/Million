<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="MadShopper">
  <!-- Samme kurv-glyf som sidens logo (templates/base.html), på brandgrøn
       #059669 (green-variablen i static/css/styles.css). Stregvægt og
