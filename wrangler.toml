name = "madshopper"
pages_build_output_dir = "dist"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

[[kv_namespaces]]
binding = "CACHE_KV"
id = "0e60bdf03ed4490cbfac5fa72c8adca5"

[[d1_databases]]
binding = "DB"
database_name = "madshopper"
database_id = "8a43b0d1-1733-4abe-ad71-aa9bde4d4d12"

[env.production]
compatibility_date = "2026-07-03"
# edgekit 0.1.1 er bygget til den indbyggede Python-SDK (den eksterne SDK blev
# default 2026-04-21). Uden dette flag fejler deploy-introspektionen.
compatibility_flags = ["python_workers", "disable_python_external_sdk"]

[env.production.vars]
CLOUDFLARE_WORKERS = "1"
SUPABASE_URL = "https://oxzxingkbsnqzpmjtktr.supabase.co"
NEXT_PUBLIC_SUPABASE_URL = "https://oxzxingkbsnqzpmjtktr.supabase.co"
SUPABASE_KEY = "sb_publishable_Jt8N0XezmzfZJSzzSwBBKQ_uGbNoq8f"
NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY = "sb_publishable_Jt8N0XezmzfZJSzzSwBBKQ_uGbNoq8f"
TABLE_SUFFIX = ""
# GOOGLE_SHEET_WEBHOOK_URL = ""  # Apps Script-webhook der sender feedback til Google Sheet

[[env.production.kv_namespaces]]
binding = "CACHE_KV"
id = "0e60bdf03ed4490cbfac5fa72c8adca5"

[[env.production.d1_databases]]
binding = "DB"
database_name = "madshopper"
database_id = "8a43b0d1-1733-4abe-ad71-aa9bde4d4d12"

# Dev/staging-worker til feature-test uden at røre produktion. Deployes via
# scripts/build-pages.sh (DEPLOY_ENV=staging) fra dev-branchen, se
# .github/workflows/deploy-edge-dev.yml. Egen KV + D1, ingen custom domain
# (bruger den gratis <name>.<subdomain>.workers.dev-URL).
[env.staging]
compatibility_date = "2026-07-03"
compatibility_flags = ["python_workers", "disable_python_external_sdk"]

[env.staging.vars]
CLOUDFLARE_WORKERS = "1"
SUPABASE_URL = "https://oxzxingkbsnqzpmjtktr.supabase.co"
NEXT_PUBLIC_SUPABASE_URL = "https://oxzxingkbsnqzpmjtktr.supabase.co"
SUPABASE_KEY = "sb_publishable_Jt8N0XezmzfZJSzzSwBBKQ_uGbNoq8f"
NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY = "sb_publishable_Jt8N0XezmzfZJSzzSwBBKQ_uGbNoq8f"
# Skrive-tabeller (cart_popularity, price_alerts) går til *_dev-kopierne,
# så test ikke rører produktionsdata - kør scripts/supabase-dev-tables.sql
TABLE_SUFFIX = "_dev"

[[env.staging.kv_namespaces]]
binding = "CACHE_KV"
id = "b879e69c3a1f477c9c69bbc7e7b041df"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "madshopper-dev"
database_id = "fa7fab55-a5e8-485a-9084-068890e9c8c5"
