name: Upload Canary Version (no traffic)

# Bygger og uploader en ny Worker-version til Cloudflare UDEN at flytte
# nogen trafik til den - "wrangler versions upload" (i modsætning til
# "wrangler deploy", som deploy-edge.yml bruger) opretter kun en inaktiv
# version. Trafik til den styres bagefter manuelt i Cloudflare-dashboardet
# via "Split versions" (Deployments-fanen > "..." på versionen > Split
# versions), hvor man kan sætte fx 5% og skrue til 0% igen uden nedetid.
#
# Kun manuel start (workflow_dispatch) - ingen push-trigger, saa denne
# rører aldrig den normale deploy-pipeline eller produktionstrafikken
# automatisk.

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Kort besked til version-historikken (valgfri)'
        type: string
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Setup Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Build Edge bundle
        env:
          CACHE_REFRESH_SECRET: ${{ secrets.CACHE_REFRESH_SECRET }}
          GOOGLE_SHEET_WEBHOOK_URL: ${{ secrets.GOOGLE_SHEET_WEBHOOK_URL }}
        run: bash scripts/build-pages.sh

      - name: Upload version (0% trafik)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            versions upload
            --message "${{ inputs.message || 'canary test' }}"
          workingDirectory: dist
