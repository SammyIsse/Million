name: Drop Supabase feedback table

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  drop:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Drop public.feedback via Supabase Management API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "SUPABASE_ACCESS_TOKEN secret mangler."
            echo "Opret token på https://supabase.com/dashboard/account/tokens"
            echo "Eller kør scripts/supabase-drop-feedback.sql i SQL Editor."
            exit 1
          fi
          PROJECT_REF="oxzxingkbsnqzpmjtktr"
          API="https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query"
          run_sql() {
            code=$(curl -sS -o /tmp/sql-out.json -w '%{http_code}' -X POST "$API" \
              -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "$(python3 -c "import json,sys; print(json.dumps({'query': sys.stdin.read()}))" <<< "$1")")
            echo "HTTP $code - $1"
            cat /tmp/sql-out.json
            test "$code" = "201" -o "$code" = "200"
          }
          run_sql 'DROP POLICY IF EXISTS "Offentlig indsendelse af feedback" ON public.feedback;'
          run_sql 'DROP POLICY IF EXISTS "Service role fuld adgang feedback" ON public.feedback;'
          run_sql 'DROP TABLE IF EXISTS public.feedback;'
          echo "feedback-tabellen er slettet."
