name: Build Nutrition Data

# Henter næringstabeller for nye EAN'er og pusher til Supabase nutrition_data.
# Genoptager inkrementelt fra Supabase (ingen lokal fil i CI), så kun nye varer
# slås op - Algolia (~2 min) køres altid, OFF kun for ukendte EAN'er.
#
# Startes kl. 02:00 dansk tid af nightly-dispatcher.yml (sommer-/vintertid
# håndteres dér), altså efter cache-updateren kl. 01:00.
#
# Her stod foer "workflow_run paa Update Product Cache". Den trigger fyrede
# ALDRIG efter en natlig cache-opdatering, fordi cache-updateren selv
# dispatches af nightly-dispatcher med GITHUB_TOKEN, og GitHub udloeser ikke
# workflow_run for koersler skabt med det token. De eneste events der slap
# igennem kom fra manuelle push'. Verificeret i koerselshistorikken: 12
# koersler, 0 succes, og tabellens nyeste raekke var fra en LOKAL koersel.
on:
  workflow_dispatch:

concurrency:
  group: build-nutrition
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-nutrition:
    runs-on: ubuntu-latest
    # Foerste fulde gennemloeb er dyrt: Open Food Facts slaas op ét EAN ad gangen
    # med 0,65 s mellem kaldene for at holde os under deres 100 kald/min. Med 90
    # min naaede kørslen aldrig i mål. Nu skriver scriptet loebende op i Supabase,
    # saa selv en afbrudt koersel rykker daekningen - og efter foerste gennemloeb
    # er der kun nye EAN'er tilbage, saa de fleste naetter er korte.
    timeout-minutes: 350
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build + push nutrition data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: python scripts/build-nutrition.py
