name: Uptime Check

# Uafhængig overvågning af produktionen. Under nedbruddet 2026-07-19 gik der
# ~3 timer fra første fejlbølge til første rollback, fordi intet alarmerede.
# Workers-observability er nu permanent slået fra (dens introspektion var selv
# årsagen til nedbruddet), så dette tjek er sitets primære alarm: GitHub sender
# mail til vedligeholderen, når et scheduled workflow fejler.
#
# GitHubs cron-minimum er 5 min, og scheduled runs kan forsinkes nogle minutter
# i spidsbelastning - det er stadig minutter i stedet for timer. Hver kørsel
# er ~6 requests i værste fald (3 forsøg x 2 sider); ingenting mod
# free-planens 100k/dag.
#
# Bemærk: GitHub deaktiverer scheduled workflows efter 60 dages inaktivitet i
# repoet - et push/commit nulstiller uret.
#
# 2026-07-20: curl blev konsekvent 403'et af Cloudflares GRATIS Bot Fight
# Mode (bekræftet via Security Analytics: "Managed Challenge", Azure-ASN
# 8075). Et forsøg med en delt hemmelighed (CI_BYPASS_SECRET) + en WAF-
# skip-regel virkede ALDRIG, selv efter secret og regel begge var korrekt
# sat op - Bot Fight Mode (i modsætning til Super Bot Fight Mode på
# Pro-planen+) kører ikke på WAF'ens Ruleset-motor og kan derfor ikke
# skippes af nogen WAF-regel (bekræftet mod Cloudflares egen dokumentation).
# Erstattet med scripts/playwright-uptime-check.mjs, som bruger en rigtig
# (headless) browser til at løse JS-udfordringen i stedet for at forsøge at
# omgå den.

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright (Chromium)
        run: |
          npm install playwright@1.61.1
          npx playwright install --with-deps chromium

      - name: Tjek forsiden og en kategoriside
        run: node scripts/playwright-uptime-check.mjs https://madshopper.dk/ https://madshopper.dk/Mejeri
