name: Genopbyg fuld produkt-cache

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Sæt Python op
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installér dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Genopbyg cache fra alle butikker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.DEPLOY_KEY }}
        run: python updater.py

      # Uden dette trin opdaterede workflowet kun Supabase app_cache, mens
      # produktionen læser fra D1 - den manuelle "genopbyg" havde altså ingen
      # effekt på hjemmesidens data. Samme trin som i cache-updater.yml.
      - name: Re-seed D1 database
        continue-on-error: true
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            python scripts/seed-d1.py
          else
            echo "CLOUDFLARE_API_TOKEN/ACCOUNT_ID ikke sat - springer D1 re-seed over"
          fi

      - name: Notificér hjemmesiden
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CACHE_REFRESH_SECRET: ${{ secrets.CACHE_REFRESH_SECRET }}
        run: |
          if [ -n "$APP_URL" ] && [ -n "$CACHE_REFRESH_SECRET" ]; then
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 -X POST "${APP_URL%/}/api/refresh-cache" \
              -H "X-Cache-Secret: $CACHE_REFRESH_SECRET" || echo "000")
            if [ "$code" = "200" ]; then
              echo "Edge-cache nulstillet (HTTP 200)"
            else
              echo "advarsel: /api/refresh-cache svarede HTTP $code - ikke kritisk (D1-seed har allerede opdateret data)"
            fi
          else
            echo "APP_URL eller CACHE_REFRESH_SECRET ikke sat"
          fi
