name: Purge CDN Cache

on:
  workflow_dispatch:

jobs:
  purge:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Purge Cloudflare CDN cache for madshopper.dk
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          set -euo pipefail
          if [ -n "${CLOUDFLARE_ZONE_ID:-}" ]; then
            ZONE_ID="$CLOUDFLARE_ZONE_ID"
          else
            ZONE_ID=$(curl -sS "https://api.cloudflare.com/client/v4/zones?name=madshopper.dk" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('success'), d; print(d['result'][0]['id'])")
          fi
          code=$(curl -s -o /tmp/purge.json -w '%{http_code}' -X POST \
            "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "HTTP $code"
          cat /tmp/purge.json
          test "$code" = "200"
