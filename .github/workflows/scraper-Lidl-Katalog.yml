name: Scraper - Lidl Katalog

on:
  schedule:
    # 00:15 dansk tid (CEST) / 23:15 dansk tid (CET)
    - cron: '15 22 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Sæt Python op
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installér dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Kør Lidl katalog scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.DEPLOY_KEY }}
        run: python scraper/lidl_katalog.py
