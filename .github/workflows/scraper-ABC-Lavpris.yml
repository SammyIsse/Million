name: Scraper - ABC Lavpris (Tjek API)

on:
  schedule:
    # 01:50 dansk tid (CET) / 02:50 sommertid (CEST)
    - cron: '50 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Sæt Python op
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installér dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Kør ABC Lavpris tilbudsavis scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.DEPLOY_KEY }}
        run: python scraper/webscrape_abc_lavpris.py
