name: Deploy Edge Worker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'app.py'
      - 'app_support.py'
      - 'src/**'
      - 'templates/**'
      - 'static/**'
      - 'pyproject.toml'
      - 'scripts/build-pages.sh'
      - 'scripts/deploy-worker.sh'
      - '.github/workflows/deploy-edge.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Setup Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Build Edge bundle
        env:
          # Uden denne genererer build-pages.sh en tilfældig secret ved hvert
          # deploy, så den deployede worker aldrig matcher GitHub-secret'en som
          # cache-updater bruger til /api/refresh-cache (→ 401 → workflow fejler).
          CACHE_REFRESH_SECRET: ${{ secrets.CACHE_REFRESH_SECRET }}
          GOOGLE_SHEET_WEBHOOK_URL: ${{ secrets.GOOGLE_SHEET_WEBHOOK_URL }}
        run: bash scripts/build-pages.sh

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          workingDirectory: dist

      - name: Nulstil edge-cache (cache_version)
        workingDirectory: dist
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx wrangler kv key put cache_version "$(date +%s)" \
            --namespace-id 0e60bdf03ed4490cbfac5fa72c8adca5 --remote

      - name: Purge CDN-cache
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_ZONE_ID:-}" ]; then
            echo "CLOUDFLARE_ZONE_ID ikke sat — springer CDN-purge over"
            exit 0
          fi
          code=$(curl -sS -o /tmp/purge.json -w '%{http_code}' -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "CDN purge HTTP ${code}"
          cat /tmp/purge.json
          test "$code" = "200"
