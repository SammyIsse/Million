name: Deploy Edge Worker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'app.py'
      - 'app_support.py'
      - 'src/**'
      - 'templates/**'
      - 'static/**'
      - 'pyproject.toml'
      - 'scripts/build-pages.sh'
      - 'scripts/deploy-worker.sh'
      - 'scripts/smoke-test.mjs'
      - '.github/workflows/deploy-edge.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Setup Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Build Edge bundle
        env:
          # Uden denne genererer build-pages.sh en tilfældig secret ved hvert
          # deploy, så den deployede worker aldrig matcher GitHub-secret'en som
          # cache-updater bruger til /api/refresh-cache (→ 401 → workflow fejler).
          CACHE_REFRESH_SECRET: ${{ secrets.CACHE_REFRESH_SECRET }}
          GOOGLE_SHEET_WEBHOOK_URL: ${{ secrets.GOOGLE_SHEET_WEBHOOK_URL }}
        run: bash scripts/build-pages.sh

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          workingDirectory: dist

      - name: Nulstil edge-cache (cache_version)
        working-directory: dist
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx wrangler kv key put cache_version "$(date +%s)" \
            --namespace-id 0e60bdf03ed4490cbfac5fa72c8adca5

      - name: Purge CDN-cache
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_ZONE_ID:-}" ]; then
            echo "CLOUDFLARE_ZONE_ID ikke sat - springer CDN-purge over"
            exit 0
          fi
          code=$(curl -sS -o /tmp/purge.json -w '%{http_code}' -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "CDN purge HTTP ${code}"
          cat /tmp/purge.json
          test "$code" = "200"

      # Fanger 2026-07-19-fejlklassen (1101/1102 under samtidig trafik, straks
      # efter deploy) FOER den naar rigtige brugere ubemaerket.
      #
      # 2026-07-20: Cloudflares GRATIS Bot Fight Mode blokerede foerst denne
      # trins curl-requests (falsk alarm, koersel #73). Et forsoeg med en
      # WAF-skip-regel + delt hemmelighed (CI_BYPASS_SECRET) virkede ALDRIG,
      # fordi Bot Fight Mode (i modsaetning til Super Bot Fight Mode paa
      # Pro-planen+) ikke koerer paa WAF'ens Ruleset-motor og derfor ikke kan
      # skippes af nogen WAF-regel, uanset hvor korrekt den er konfigureret
      # (bekraeftet mod Cloudflares egen dokumentation). Erstattet med
      # scripts/smoke-test.mjs, som bruger en rigtig (headless) browser til
      # at loese JS-udfordringen i stedet for at forsoege at omgaa den.
      #
      # continue-on-error er bevidst IKKE fjernet endnu - Playwright-udgaven
      # er ikke bekraeftet ved en rigtig koersel mod produktionen endnu.
      # Fjern foerst naar en koersel har vist reelle 200'ere.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright (Chromium)
        run: |
          npm install playwright@1.61.1
          npx playwright install --with-deps chromium

      - name: Roegtest af produktionen (samtidige requests)
        continue-on-error: true
        run: node scripts/smoke-test.mjs https://madshopper.dk

      - name: Relay ventende feedback til Google Sheet
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GOOGLE_SHEET_WEBHOOK_URL: ${{ secrets.GOOGLE_SHEET_WEBHOOK_URL }}
        run: pip install httpx && python scripts/relay-feedback-to-sheet.py
