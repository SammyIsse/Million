name: Scraper - Brugsen

on:
  schedule:
    # 00:01 dansk tid (CEST, sommer) / 23:01 CET (vinter) — GitHub cron kører i UTC
    - cron: '1 22 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - name: Sæt Python op
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installér Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Installér dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          python -c "import selenium; print(f'Selenium: {selenium.__version__}')"

      - name: Kør scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.DEPLOY_KEY }}
        run: python scraper/webscrape_brugsen.py
