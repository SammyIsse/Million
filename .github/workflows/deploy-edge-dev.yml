name: Deploy Edge Worker (staging)

# Samme flow som deploy-edge.yml, men til madshopper-dev (egen KV/D1,
# workers.dev-URL) i stedet for produktion - så features kan testes på en
# rigtig edge-deployment uden at røre madshopper.dk.
on:
  workflow_dispatch:
  push:
    branches: [dev]
    paths:
      - 'app.py'
      - 'app_support.py'
      - 'src/**'
      - 'templates/**'
      - 'static/**'
      - 'pyproject.toml'
      - 'scripts/build-pages.sh'
      - 'scripts/smoke-test.mjs'
      - '.github/workflows/deploy-edge-dev.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DEPLOY_ENV: staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Setup Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Build Edge bundle
        env:
          CACHE_REFRESH_SECRET: ${{ secrets.CACHE_REFRESH_SECRET }}
          # Uden denne byggede staging med tom webhook-URL, saa feedback afgivet
          # paa dev aldrig kunne naa Google Sheet (samme var som i deploy-edge.yml).
          GOOGLE_SHEET_WEBHOOK_URL: ${{ secrets.GOOGLE_SHEET_WEBHOOK_URL }}
          # Adgangsspaerring paa staging. madshopper-dev koerer den samme kode
          # mod SAMME Supabase-projekt og samme auth.users som produktionen, men
          # paa en offentlig workers.dev-URL. Uden denne er hele fladen aaben for
          # enhver der gaetter adressen. Er secret'en ikke sat, genererer
          # build-pages.sh en tilfaeldig ved hvert build - saa skifter
          # adgangsnoeglen ved hvert deploy (spaerringen virker stadig).
          STAGING_ACCESS_SECRET: ${{ secrets.STAGING_ACCESS_SECRET }}
        run: bash scripts/build-pages.sh

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          workingDirectory: dist

      - name: Nulstil edge-cache (cache_version)
        working-directory: dist
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx wrangler kv key put cache_version "$(date +%s)" \
            --namespace-id b879e69c3a1f477c9c69bbc7e7b041df

      # Samme roegtest som produktionens deploy-edge.yml, men mod staging - saa
      # 2026-07-19-fejlklassen (1101/1102 under samtidig trafik) fanges HER,
      # inden koden overhovedet naar main. Staging afsloerede intet dengang,
      # netop fordi ingen belastede den med samtidige requests.
      #
      # Bruger scripts/smoke-test.mjs (Playwright/headless browser) i stedet
      # for curl - se deploy-edge.yml for hvorfor curl+WAF-skip-regel aldrig
      # kunne virke mod Cloudflares gratis Bot Fight Mode.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright (Chromium)
        run: |
          npm install playwright@1.61.1
          npx playwright install --with-deps chromium

      - name: Roegtest af staging (samtidige requests)
        # Adgangsnoeglen sendes med: staging er spaerret og svarer 404 uden den,
        # saa uden dette ville roegtesten maale sin egen spaerring i stedet for
        # sitet. Noeglen bruges kun paa warmup-navigationen, som saetter en
        # cookie resten af koerslen genbruger. GitHub maskerer den i loggen.
        env:
          STAGING_ACCESS_SECRET: ${{ secrets.STAGING_ACCESS_SECRET }}
        run: node scripts/smoke-test.mjs https://madshopper-dev.kasp478g.workers.dev "$STAGING_ACCESS_SECRET"
