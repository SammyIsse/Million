name: Nightly Dispatcher

# Håndterer dansk sommertid/vintertid: GitHub cron kører i UTC, så hvert slot
# har to cron-tider, og kun den der matcher Danmarks aktuelle UTC-offset
# udføres. Scraperne og cache-fallbacken har derfor ingen egen cron - de
# startes herfra.
on:
  schedule:
    - cron: '1 22 * * *'   # 00:01 dansk tid ved sommertid (CEST) -> scrapers
    - cron: '1 23 * * *'   # 00:01 dansk tid ved vintertid (CET)  -> scrapers
    - cron: '0 23 * * *'   # 01:00 dansk tid ved sommertid -> cache-updater fallback
    - cron: '0 0 * * *'    # 01:00 vintertid -> cache-updater | 02:00 sommertid -> nutrition
    - cron: '0 1 * * *'    # 02:00 dansk tid ved vintertid -> nutrition
  workflow_dispatch:
    inputs:
      slot:
        description: 'Hvad skal startes'
        type: choice
        options:
          - scrapers
          - cache-fallback
          - nutrition
        default: scrapers

permissions:
  actions: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Bestem slot ud fra dansk tid
        id: slot
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_SLOT: ${{ inputs.slot }}
          CRON: ${{ github.event.schedule }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "slot=$INPUT_SLOT" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          OFFSET="$(TZ=Europe/Copenhagen date +%z)"   # +0200 sommer / +0100 vinter
          case "$CRON|$OFFSET" in
            "1 22 * * *|+0200"|"1 23 * * *|+0100") SLOT=scrapers ;;
            "0 23 * * *|+0200"|"0 0 * * *|+0100")  SLOT=cache-fallback ;;
            "0 0 * * *|+0200"|"0 1 * * *|+0100")   SLOT=nutrition ;;
            *)                                      SLOT=skip ;;
          esac
          echo "Cron '$CRON' + offset $OFFSET -> $SLOT"
          echo "slot=$SLOT" >> "$GITHUB_OUTPUT"

      - name: Start alle scrapers (kl. 00:01 dansk tid)
        if: steps.slot.outputs.slot == 'scrapers'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FEJL=0
          for wf in \
            scraper-365discount.yml \
            scraper-ABC-Lavpris.yml \
            scraper-Bilka.yml \
            scraper-Brugsen.yml \
            scraper-Foetex.yml \
            scraper-Katalog.yml \
            scraper-Kvickly.yml \
            scraper-Lidl-Katalog.yml \
            scraper-Lidl.yml \
            scraper-Lovbjerg.yml \
            scraper-Meny.yml \
            scraper-Netto.yml \
            scraper-Spar.yml \
            scraper-SuperBrugsen.yml \
            scraper-minkobmand.yml
          do
            if gh workflow run "$wf" --ref "${{ github.ref_name }}" -R "${{ github.repository }}"; then
              echo "Startet: $wf"
            else
              echo "::error::Kunne ikke starte $wf"
              FEJL=1
            fi
          done
          exit $FEJL

      - name: Start cache-updater fallback (kl. 01:00 dansk tid)
        if: steps.slot.outputs.slot == 'cache-fallback'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run cache-updater.yml --ref "${{ github.ref_name }}" -R "${{ github.repository }}"

      # Startes herfra og ikke af et workflow_run paa "Update Product Cache":
      # cache-updateren dispatches selv af denne bot, og GitHub udloeser ikke
      # workflow_run for koersler skabt med GITHUB_TOKEN. Den kaede var doed i
      # praksis - build-nutrition naaede aldrig at koere efter en natlig
      # cache-opdatering. Cache-updateren tager ~5 min fra kl. 01:00, saa 02:00
      # har rigelig margin.
      - name: Start nutrition-build (kl. 02:00 dansk tid)
        if: steps.slot.outputs.slot == 'nutrition'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run build-nutrition.yml --ref "${{ github.ref_name }}" -R "${{ github.repository }}"
