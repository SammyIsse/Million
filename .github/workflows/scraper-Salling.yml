name: Scraper - Salling (Føtex + Netto madspild)

on:
  schedule:
    # 06:00 dansk tid (CET) / 07:00 sommertid (CEST)
    - cron: '0 5 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Sæt Python op
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installér dependencies
        run: |
          pip install --upgrade pip
          pip install requests supabase python-dotenv

      - name: Kør Salling madspild-scraper
        env:
          SALLING_API_KEY: ${{ secrets.SALLING_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.DEPLOY_KEY }}
        run: python scraper/webscrape_salling.py
