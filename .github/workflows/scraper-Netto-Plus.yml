name: Scraper - Netto+ +Priser (p-club)

on:
  schedule:
    # 01:15 dansk tid (CET) / 02:15 sommertid (CEST) — efter almindelig Netto-scraper
    - cron: '15 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Sæt Python op
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installér dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Kør Netto+ +Priser scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.DEPLOY_KEY }}
          NETTO_ID_TOKEN: ${{ secrets.NETTO_ID_TOKEN }}
        run: python scraper/netto_plus_priser.py
