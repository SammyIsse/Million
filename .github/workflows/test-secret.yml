name: Test Supabase Secret

on:
  workflow_dispatch  # kør manuelt

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Tjek at secret findes
        run: |
          if [ -z "${{ secrets.SUPABASE_KEY }}" ]; then
            echo "FEJL: Secret ikke fundet"
          else
            echo "OK: Secret er sat"
          fi
