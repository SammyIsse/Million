name: Update Product Cache

on:
  # Normalt trigget ~00:20 via trigger-cache-updater.yml; fallback kl. 01:00
  # dansk tid startes af nightly-dispatcher.yml (sommer-/vintertid håndteres dér)
  workflow_dispatch:
    inputs:
      staging_only:
        description: 'Kun madshopper-dev (seed dev-D1, rør ikke produktions-D1/cache)'
        type: boolean
        default: false
  push:
    branches: [main, dev]
    paths:
      - 'updater.py'
      - 'app_support.py'
      - 'scraper/**'
      - 'data/rema_hashes.json'
      - '.github/workflows/cache-updater.yml'

concurrency:
  group: update-product-cache
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run updater script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          APP_URL: ${{ secrets.APP_URL }}
          CACHE_REFRESH_SECRET: ${{ secrets.CACHE_REFRESH_SECRET }}
        run: python updater.py

      - name: Re-seed D1 database
        continue-on-error: true
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEPLOY_ENV: ${{ (github.ref == 'refs/heads/dev' || inputs.staging_only) && 'staging' || '' }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            python scripts/seed-d1.py
          else
            echo "CLOUDFLARE_API_TOKEN/ACCOUNT_ID ikke sat - springer D1 re-seed over"
          fi

      - name: Opdater hjemmesidens cache
        if: ${{ github.ref != 'refs/heads/dev' && !inputs.staging_only }}
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CACHE_REFRESH_SECRET: ${{ secrets.CACHE_REFRESH_SECRET }}
        run: |
          if [ -n "$APP_URL" ] && [ -n "$CACHE_REFRESH_SECRET" ]; then
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 -X POST "${APP_URL%/}/api/refresh-cache" \
              -H "X-Cache-Secret: $CACHE_REFRESH_SECRET" || echo "000")
            if [ "$code" = "200" ]; then
              echo "Edge-cache nulstillet (HTTP 200)"
            else
              # Ikke-kritisk: D1-seed + cache_version har allerede opdateret data
              # på edge. Vi fejler ikke hele pipelinen på et cache-ping.
              echo "advarsel: /api/refresh-cache svarede HTTP $code - ikke kritisk (D1-seed har allerede opdateret data)"
            fi
          else
            echo "APP_URL eller CACHE_REFRESH_SECRET ikke sat - hjemmesiden henter nye data ved første besøg næste dag"
          fi
