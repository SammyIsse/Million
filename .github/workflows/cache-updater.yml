name: Update Product Cache

on:
  schedule:
    # Kører én gang om dagen kl. 07:00 UTC — tidligst muligt efter scrapers er færdige (starter 01:00, max 350 min = 06:50)
    - cron: '0 7 * * *'
  workflow_dispatch:
    # Tillad manuel kørsel fra GitHub UI

jobs:
  update-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run updater script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.DEPLOY_KEY }}
        run: python updater.py
