name: Update Product Cache

on:
  schedule:
    # 05:00 dansk tid (CEST) / 04:00 CET — GitHub cron kører i UTC
    # Alle scrapers færdige ~04:30 CEST — 30 min buffer
    - cron: '0 3 * * *'
  workflow_dispatch:
    # Tillad manuel kørsel fra GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run updater script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.DEPLOY_KEY }}
        run: python updater.py

      - name: Re-seed D1 database
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            python scripts/seed-d1.py
          else
            echo "CLOUDFLARE_API_TOKEN/ACCOUNT_ID ikke sat — springer D1 re-seed over"
          fi

      - name: Opdater hjemmesidens cache
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CACHE_REFRESH_SECRET: ${{ secrets.CACHE_REFRESH_SECRET }}
        run: |
          if [ -n "$APP_URL" ] && [ -n "$CACHE_REFRESH_SECRET" ]; then
            curl -sf --max-time 30 -X POST "${APP_URL%/}/api/refresh-cache" \
              -H "X-Cache-Secret: $CACHE_REFRESH_SECRET"
          else
            echo "APP_URL eller CACHE_REFRESH_SECRET ikke sat — hjemmesiden henter nye data ved første besøg næste dag"
          fi
