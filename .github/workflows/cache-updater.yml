name: Update Product Cache

on:
  schedule:
    # 01:00 dansk tid (CET) / 02:00 sommertid (CEST) — GitHub cron kører i UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Tillad manuel kørsel fra GitHub UI

jobs:
  update-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run updater script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.DEPLOY_KEY }}
        run: python updater.py --rema-only

      - name: Opdater hjemmesidens cache
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CACHE_REFRESH_SECRET: ${{ secrets.CACHE_REFRESH_SECRET }}
        run: |
          if [ -n "$APP_URL" ] && [ -n "$CACHE_REFRESH_SECRET" ]; then
            curl -sf -X POST "${APP_URL%/}/api/refresh-cache" \
              -H "X-Cache-Secret: $CACHE_REFRESH_SECRET"
          else
            echo "APP_URL eller CACHE_REFRESH_SECRET ikke sat — hjemmesiden henter nye data ved første besøg næste dag"
          fi
