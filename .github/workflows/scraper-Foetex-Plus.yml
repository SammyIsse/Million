name: Scraper - Foetex+ +Priser (p-club)

on:
  schedule:
    # 01:45 dansk tid (CET) / 02:45 sommertid (CEST) — efter almindelig Føtex-scraper
    - cron: '45 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Sæt Python op
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installér dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Kør Føtex+ +Priser scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.DEPLOY_KEY }}
          FOETEX_ID_TOKEN: ${{ secrets.FOETEX_ID_TOKEN }}
        run: python scraper/foetex_plus_priser.py
